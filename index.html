<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>単語記憶実験</title>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>

  <!-- プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>

  <style>

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: white;
    }

    /* jsPsych画面全体を中央配置 */
    .jspsych-display-element {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      width: 100vw;
      height: 100vh;
    }

    .center-text {
      width: 100%;
      text-align: center;
      font-family: sans-serif;
    }

  </style>

</head>

<body></body>

<script>

const jsPsych = initJsPsych();

let timeline = [];

/* ------------------------
   教示画面
------------------------ */

timeline.push({

  type: jsPsychHtmlButtonResponse,

  stimulus: `
    <div class="center-text"
         style="font-size:20px; line-height:1.8;">
      これから単語が表示されます。<br>
      後でテストを行うので、<br>
      できるだけ単語を覚えてください。
    </div>
  `,

  choices: ['開始する']

});

/* ------------------------
   単語リスト
------------------------ */

let study_words = [
  "晴れ",
  "笑顔",
  "成功",
  "旅行",
  "友情",
  "雨",
  "失敗",
  "希望",
  "悲しみ",
  "音楽"
];

/* ------------------------
   ランダム化
------------------------ */

study_words = jsPsych.randomization.shuffle(study_words);

/* ------------------------
   単語提示フェーズ
------------------------ */

study_words.forEach(function(word){

  /* 注視点 ＋ */

  timeline.push({

    type: jsPsychHtmlKeyboardResponse,

    stimulus: `
      <div class="center-text"
           style="font-size:80px;">
        ＋
      </div>
    `,

    choices: "NO_KEYS",

    trial_duration: 1000

  });

  /* 単語提示 */

  timeline.push({

    type: jsPsychHtmlKeyboardResponse,

    stimulus: `
      <div class="center-text"
           style="font-size:100px;">
        ${word}
      </div>
    `,

    choices: "NO_KEYS",

    trial_duration: 5000

  });

});

/* ------------------------
   終了画面
------------------------ */

timeline.push({

  type: jsPsychHtmlButtonResponse,

  stimulus: `
    <div class="center-text"
         style="font-size:20px; line-height:1.8;">
      実験は終了しました。<br>
      ご協力ありがとうございました。<br><br>
      このページを閉じてください。
    </div>
  `,

  choices: ['終了']

});

/* ------------------------
   実行
------------------------ */

jsPsych.run(timeline);

</script>

</html>
